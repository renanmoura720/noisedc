name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  testes:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Instalar dependências de sistema
        run: sudo apt-get update && sudo apt-get install -y libsndfile1

      - name: Instalar o pacote
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verificar estilo
        run: ruff check src tests

      - name: Executar os testes
        run: pytest -q

  seguranca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Varredura de segredos
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auditoria do projeto
        run: bash scripts/verificar_dados_sensiveis.sh
